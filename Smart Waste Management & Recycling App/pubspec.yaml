name: smart_waste_management
description: Smart Waste Management & Recycling App — Clean Architecture (MVVM + Repository) + Firebase
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7

  # State management
  provider: ^6.1.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Local storage & offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1

  # Image & UI
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
